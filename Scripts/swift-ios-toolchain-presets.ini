[preset: nyxian_iphoneos_arm64_crosscompiler]

build-subdir=LLVMClangSwift_iphoneos
release
reconfigure
no-assertions
no-llvm-assertions
no-swift-assertions
no-swift-stdlib-assertions

cross-compile-hosts=iphoneos-arm64
compiler-vendor=apple
swift-primary-variant-sdk=IOS
swift-primary-variant-arch=arm64
extra-cmake-options=
    -DLLVM_ENABLE_BACKTRACES:BOOL=OFF
    -DLLVM_ENABLE_ZSTD:STRING=OFF
    -DBUILD_TESTING:BOOL=OFF
    -DCLANG_ENABLE_CLANGD:BOOL=OFF
    -DSWIFT_BUILD_SOURCEKIT:BOOL=FALSE
    -DSWIFT_ENABLE_SOURCEKIT_TESTS:BOOL=FALSE
    -DLLVM_ENABLE_THREADS:BOOL=ON
    -DLLVM_ENABLE_ASSERTIONS=OFF
    -DLLVM_ENABLE_RTTI:BOOL=ON
    -DLLVM_ENABLE_EH:BOOL=OFF
    -DCMAKE_C_COMPILER_TARGET=arm64-apple-darwin
    -DCMAKE_CXX_COMPILER_TARGET=arm64-apple-darwin

build-toolchain-only=1
build-stdlib-deployment-targets=
skip-build-clang-tools-extra
build-swift-static-stdlib=0
build-swift-dynamic-stdlib=0
build-swift-static-sdk-overlay=0
build-swift-dynamic-sdk-overlay=0
build-swift-libexec=0
build-runtime-with-host-compiler=0
skip-build-benchmarks
llvm-include-tests=0
llvm-enable-modules=0
build-swift-examples=0
swift-include-tests=0
darwin-deployment-version-ios=16.0
darwin-crash-reporter-client=1
llvm-install-components=llvm-ar;llvm-nm;llvm-ranlib;llvm-cov;llvm-profdata;llvm-objdump;llvm-objcopy;llvm-symbolizer;IndexStore;clang;clang-resource-headers;builtins;runtimes;libclang;LTO;clang-features-file;lld
host-target=macosx-arm64
